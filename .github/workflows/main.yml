<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎾 Pickleball Score Remote</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a1a;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #00ff88 0%, #00cc66 100%);
            padding: 15px;
            text-align: center;
            color: #000;
        }

        .header h1 {
            font-size: 20px;
            font-weight: bold;
        }

        .status-bar {
            background: #2a2a2a;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        .status-dot.disconnected {
            background: #ff4444;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .connection-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d4a2d 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            text-align: center;
        }

        .connection-screen.hidden {
            display: none;
        }

        .connection-logo {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .connection-title {
            font-size: 24px;
            color: #00ff88;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .connection-subtitle {
            font-size: 16px;
            color: #ccc;
            margin-bottom: 30px;
        }

        .session-input-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 30px;
            margin: 20px 0;
            border: 2px solid #333;
            width: 100%;
            max-width: 350px;
        }

        .session-input-title {
            font-size: 18px;
            color: #00ff88;
            margin-bottom: 20px;
            text-align: center;
        }

        .session-input {
            width: 100%;
            padding: 15px 20px;
            background: #333;
            border: 2px solid #555;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            text-align: center;
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .session-input:focus {
            outline: none;
            border-color: #00ff88;
            box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.1);
        }

        .connect-button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #00ff88 0%, #00cc66 100%);
            color: #000;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }

        .connect-button:active {
            transform: scale(0.95);
        }

        .connect-button:disabled {
            background: #666;
            color: #999;
            cursor: not-allowed;
        }

        .connection-status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
        }

        .connection-status.connecting {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
            border: 1px solid #ffc107;
        }

        .connection-status.error {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            border: 1px solid #ff4444;
        }

        .connection-status.success {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
            border: 1px solid #00ff88;
        }

        .auto-connecting {
            margin-top: 30px;
            color: #00ff88;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid #333;
            border-top: 3px solid #00ff88;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .main-app {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .main-app.hidden {
            display: none;
        }

        .score-display {
            padding: 30px 20px;
            text-align: center;
            background: #0a0a0a;
            margin: 20px;
            border-radius: 20px;
            border: 2px solid #333;
        }

        .scores {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .team-score {
            text-align: center;
        }

        .team-name {
            font-size: 18px;
            color: #888;
            margin-bottom: 10px;
        }

        .team-name.serving {
            color: #00ff88;
            font-weight: bold;
        }

        .score-number {
            font-size: 72px;
            font-weight: bold;
        }

        .vs {
            font-size: 24px;
            color: #666;
        }

        .control-buttons {
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex: 1;
        }

        .team-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            padding: 40px 20px;
            border: none;
            border-radius: 15px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            position: relative;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-team-a {
            background: linear-gradient(135deg, #00ff88 0%, #00cc66 100%);
            color: #000;
        }

        .btn-team-b {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }

        .btn-secondary {
            background: #3a3a3a;
            border: 2px solid #555;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-undo {
            background: #666;
        }

        .btn-serve {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: #000;
        }

        .btn-new-game {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }

        .share-section {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 20px 20px 0 0;
            margin-top: auto;
        }

        .share-title {
            font-size: 16px;
            margin-bottom: 15px;
            text-align: center;
            color: #00ff88;
        }

        .share-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .share-btn {
            padding: 15px 10px;
            background: #3a3a3a;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .share-btn:active {
            background: #4a4a4a;
        }

        .share-icon {
            font-size: 24px;
        }

        .whatsapp { background: #25d366; }
        .instagram { background: linear-gradient(135deg, #f58529 0%, #dd2a7b 50%, #8134af 100%); }
        .copy { background: #666; }

        .success-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #00ff88;
            color: #000;
            padding: 20px 40px;
            border-radius: 15px;
            font-weight: bold;
            display: none;
            z-index: 1000;
        }

        .success-toast.show {
            display: block;
            animation: fadeInOut 1s;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        .session-info {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid #00ff88;
            border-radius: 10px;
            padding: 10px 15px;
            margin: 10px 20px;
            font-size: 14px;
            text-align: center;
        }

        .session-id {
            font-family: monospace;
            font-weight: bold;
            color: #00ff88;
        }

        .connection-count {
            color: #ccc;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="connection-screen" id="connectionScreen">
        <div class="connection-logo">🎾</div>
        <div class="connection-title">Pickleball Score Remote</div>
        <div class="connection-subtitle">Connect to a live match</div>

        <div class="auto-connecting" id="autoConnecting" style="display: none;">
            <div class="spinner"></div>
            <div>Connecting to session...</div>
            <div id="autoSessionId" style="font-family: monospace; margin-top: 10px;"></div>
        </div>

        <div class="session-input-container" id="manualInput">
            <div class="session-input-title">Enter Session Code</div>
            <input
                type="text"
                class="session-input"
                id="sessionIdInput"
                placeholder="ABC123"
                maxlength="6"
                autocomplete="off"
                autocapitalize="characters"
            >
            <button class="connect-button" id="connectButton" onclick="connectToSession()">
                Connect to Match
            </button>
        </div>

        <div class="connection-status" id="connectionStatus" style="display: none;"></div>
    </div>

    <div class="main-app hidden" id="mainApp">
        <div class="header">
            <h1>🎾 SCORE REMOTE</h1>
        </div>

        <div class="status-bar">
            <div>
                <span class="status-dot" id="statusDot"></span>
                <span id="connectionText">Live verbunden</span>
            </div>
            <div id="streamStatus">
                📺 YouTube Live
            </div>
        </div>

        <div class="session-info" id="sessionInfo" style="display: none;">
            <div>Session: <span class="session-id" id="currentSessionId"></span></div>
            <div class="connection-count" id="connectionCount"></div>
        </div>

        <div class="score-display">
            <div class="scores">
                <div class="team-score">
                    <div class="team-name serving" id="teamAName">Sergio</div>
                    <div class="score-number" id="scoreA">0</div>
                </div>
                <div class="vs">VS</div>
                <div class="team-score">
                    <div class="team-name" id="teamBName">Vice</div>
                    <div class="score-number" id="scoreB">0</div>
                </div>
            </div>
        </div>

        <div class="control-buttons">
            <div class="team-buttons">
                <button class="btn btn-team-a" onclick="addPoint('A')">
                    <span id="btnTeamA">Sergio</span><br>+1
                </button>
                <button class="btn btn-team-b" onclick="addPoint('B')">
                    <span id="btnTeamB">Vice</span><br>+1
                </button>
            </div>

            <div class="action-buttons">
                <button class="btn btn-undo" onclick="undo()">
                    ↩️ Rückgängig
                </button>
                <button class="btn btn-serve" onclick="switchServe()">
                    🎾 Aufschlag
                </button>
            </div>

            <button class="btn btn-new-game" onclick="newGame()">
                🔄 Neues Spiel
            </button>
        </div>

        <div class="share-section">
            <div class="share-title">📢 Stream teilen & Zuschauer einladen!</div>
            <div class="share-buttons">
                <button class="share-btn whatsapp" onclick="shareWhatsApp()">
                    <span class="share-icon">💬</span>
                    <span>WhatsApp</span>
                </button>
                <button class="share-btn instagram" onclick="shareInstagram()">
                    <span class="share-icon">📷</span>
                    <span>Instagram</span>
                </button>
                <button class="share-btn copy" onclick="copyLink()">
                    <span class="share-icon">📋</span>
                    <span>Link kopieren</span>
                </button>
            </div>
        </div>
    </div>

    <div class="success-toast" id="successToast"></div>

    <script>
        let ws = null;
        let currentSessionId = null;
        let isConnected = false;
        let connectionAttempts = 0;
        const maxRetries = 3;

        let currentState = {
            scoreA: 0,
            scoreB: 0,
            teamA: 'Sergio',
            teamB: 'Vice',
            server: 'A',
            platform: 'youtube',
            streamLink: ''
        };

        function detectDeepLink() {
            console.log('🔗 Checking for Deep Link...');

            const urlParams = new URLSearchParams(window.location.search);
            const sessionFromUrl = urlParams.get('session') || urlParams.get('s');

            const hash = window.location.hash;
            const sessionFromHash = hash.match(/session[=/]([A-Z0-9]{6})/i);

            const sessionFromStorage = sessionStorage.getItem('deeplink_session');

            const pathMatch = window.location.pathname.match(/\/join\/([A-Z0-9]{6})/i);
            const sessionFromPath = pathMatch ? pathMatch[1] : null;

            const detectedSession = sessionFromUrl ||
                                   (sessionFromHash && sessionFromHash[1]) ||
                                   sessionFromStorage ||
                                   sessionFromPath;

            console.log('🔍 Deep Link Detection:', {
                url: sessionFromUrl,
                hash: sessionFromHash && sessionFromHash[1],
                storage: sessionFromStorage,
                path: sessionFromPath,
                detected: detectedSession
            });

            if (detectedSession) {
                console.log('✅ Deep Link detected:', detectedSession);
                return detectedSession.toUpperCase();
            }

            return null;
        }

        function handleDeepLink(sessionId) {
            console.log('🚀 Handling Deep Link for session:', sessionId);

            currentSessionId = sessionId;

            document.getElementById('autoConnecting').style.display = 'block';
            document.getElementById('manualInput').style.display = 'none';
            document.getElementById('autoSessionId').textContent = `Session: ${sessionId}`;

            sessionStorage.removeItem('deeplink_session');

            setTimeout(() => {
                connectToSessionDirect(sessionId);
            }, 1500);
        }

        async function connectToSession() {
            const sessionInput = document.getElementById('sessionIdInput');
            const sessionId = sessionInput.value.trim().toUpperCase();

            if (!sessionId || sessionId.length !== 6) {
                showConnectionStatus('Please enter a 6-character session code', 'error');
                return;
            }

            connectToSessionDirect(sessionId);
        }

        async function connectToSessionDirect(sessionId) {
            console.log('🔌 Connecting to session:', sessionId);

            currentSessionId = sessionId;
            connectionAttempts++;

            showConnectionStatus('Connecting...', 'connecting');
            document.getElementById('connectButton').disabled = true;

            try {
                const response = await fetch(`http://91.99.146.195:8000/api/session/${sessionId}/join`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'}
                });

                const sessionInfo = await response.json();

                if (!sessionInfo.success) {
                    throw new Error(sessionInfo.error || 'Session not found');
                }

                console.log('✅ Session validated:', sessionInfo);

                await connectSessionWebSocket(sessionId);

                updateFromSessionInfo(sessionInfo);

                showMainApp();

                showConnectionStatus('Connected successfully!', 'success');

            } catch (error) {
                console.error('❌ Connection failed:', error);

                if (connectionAttempts < maxRetries) {
                    showConnectionStatus(`Connection failed. Retrying... (${connectionAttempts}/${maxRetries})`, 'error');
                    setTimeout(() => connectToSessionDirect(sessionId), 2000);
                } else {
                    showConnectionStatus(`Failed to connect: ${error.message}`, 'error');
                    resetConnectionScreen();
                }
            }
        }

        async function connectSessionWebSocket(sessionId) {
            return new Promise((resolve, reject) => {
                const wsUrl = `ws://91.99.146.195:8000/ws/session/${sessionId}?role=controller`;
                console.log('🔌 Connecting WebSocket:', wsUrl);

                ws = new WebSocket(wsUrl);

                ws.onopen = () => {
                    console.log('✅ WebSocket connected to session:', sessionId);
                    isConnected = true;
                    updateConnectionStatus();
                    resolve();
                };

                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    console.log('📨 Session message:', data);
                    handleSessionMessage(data);
                };

                ws.onclose = () => {
                    console.log('❌ WebSocket disconnected');
                    isConnected = false;
                    updateConnectionStatus();

                    setTimeout(() => {
                        if (currentSessionId) {
                            console.log('🔄 Auto-reconnecting...');
                            connectSessionWebSocket(currentSessionId);
                        }
                    }, 3000);
                };

                ws.onerror = (error) => {
                    console.error('❌ WebSocket error:', error);
                    isConnected = false;
                    updateConnectionStatus();
                    reject(error);
                };

                setTimeout(() => {
                    if (ws.readyState !== WebSocket.OPEN) {
                        reject(new Error('WebSocket connection timeout'));
                    }
                }, 10000);
            });
        }

        function handleSessionMessage(data) {
            switch (data.type) {
                case 'session_joined':
                    console.log('🎉 Successfully joined session');
                    currentState = data.data;
                    updateDisplay(data.data);
                    updateSessionInfo(data.session_id);
                    break;

                case 'score_update':
                    currentState = data.data;
                    updateDisplay(data.data);
                    break;

                case 'settings_update':
                    currentState = data.data;
                    updateDisplay(data.data);
                    break;

                case 'participant_joined':
                    updateConnectionCount(data.controller_count, data.host_connected);
                    break;

                case 'participant_left':
                    updateConnectionCount(data.controller_count, data.host_connected);
                    break;

                case 'error':
                    console.error('❌ Session error:', data.error);
                    showConnectionStatus(data.error, 'error');
                    break;

                default:
                    console.log('📨 Unknown message type:', data.type);
            }
        }

        function updateFromSessionInfo(sessionInfo) {
            if (sessionInfo.game_state) {
                currentState = sessionInfo.game_state;
                updateDisplay(sessionInfo.game_state);
            }

            updateConnectionCount(sessionInfo.controller_count, sessionInfo.host_connected);
        }

        function showConnectionStatus(message, type) {
            const statusEl = document.getElementById('connectionStatus');
            statusEl.textContent = message;
            statusEl.className = `connection-status ${type}`;
            statusEl.style.display = 'block';

            if (type === 'success') {
                setTimeout(() => {
                    statusEl.style.display = 'none';
                }, 3000);
            }
        }

        function resetConnectionScreen() {
            document.getElementById('autoConnecting').style.display = 'none';
            document.getElementById('manualInput').style.display = 'block';
            document.getElementById('connectButton').disabled = false;
            connectionAttempts = 0;
        }

        function showMainApp() {
            document.getElementById('connectionScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
        }

        function updateSessionInfo(sessionId) {
            document.getElementById('currentSessionId').textContent = sessionId;
            document.getElementById('sessionInfo').style.display = 'block';
        }

        function updateConnectionCount(controllers, hostConnected) {
            const countEl = document.getElementById('connectionCount');
            countEl.textContent = `👥 ${controllers} controller(s) | Host: ${hostConnected ? '✅' : '❌'}`;
        }

        function updateConnectionStatus() {
            const statusDot = document.getElementById('statusDot');
            const connectionText = document.getElementById('connectionText');

            if (isConnected) {
                statusDot.classList.remove('disconnected');
                connectionText.textContent = 'Session verbunden';
            } else {
                statusDot.classList.add('disconnected');
                connectionText.textContent = 'Verbindung verloren';
            }
        }

        function updateDisplay(data) {
            document.getElementById('scoreA').textContent = data.scoreA;
            document.getElementById('scoreB').textContent = data.scoreB;
            document.getElementById('teamAName').textContent = data.teamA;
            document.getElementById('teamBName').textContent = data.teamB;
            document.getElementById('btnTeamA').textContent = data.teamA;
            document.getElementById('btnTeamB').textContent = data.teamB;

            document.getElementById('teamAName').classList.toggle('serving', data.server === 'A');
            document.getElementById('teamBName').classList.toggle('serving', data.server === 'B');

            if (data.streamLink) {
                currentState.streamLink = data.streamLink;
                currentState.platform = data.streamPlatform || 'YouTube';
                document.getElementById('streamStatus').textContent = `📺 ${currentState.platform} Live`;
            }
        }

        function addPoint(team) {
            vibrate();
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'score',
                    team: team,
                    action: 'add'
                }));
            }
            showSuccess('+1');
        }

        function undo() {
            vibrate();
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'undo'
                }));
            }
        }

        function switchServe() {
            vibrate();
            if (ws && ws.readyState === WebSocket.OPEN) {
                const newServer = currentState.server === 'A' ? 'B' : 'A';
                ws.send(JSON.stringify({
                    type: 'serve',
                    server: newServer
                }));
            }
        }

        function newGame() {
            vibrate();
            if (confirm('Neues Spiel starten?')) {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'reset'
                    }));
                }
            }
        }

        function shareWhatsApp() {
            const sessionLink = generateSessionLink();
            const text = `🎾 LIVE Pickleball!\n${currentState.teamA} vs ${currentState.teamB}\n\nJoin the action:\n${sessionLink}`;
            const whatsappUrl = `https://wa.me/?text=${encodeURIComponent(text)}`;
            window.open(whatsappUrl, '_blank');
        }

        function shareInstagram() {
            const sessionLink = generateSessionLink();
            copyToClipboard(sessionLink);
            alert('Link kopiert! Füge ihn in deine Instagram Story ein.');
        }

        function copyLink() {
            const sessionLink = generateSessionLink();
            copyToClipboard(sessionLink);
            showSuccess('Link kopiert!');
        }

        function generateSessionLink() {
            if (currentSessionId) {
                return `https://pickleballtv.app/join/${currentSessionId}`;
            }
            return currentState.streamLink || window.location.href;
        }

        function copyToClipboard(text) {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text);
            } else {
                const textArea = document.createElement('textarea');
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
            }
        }

        function vibrate() {
            if (navigator.vibrate) {
                navigator.vibrate(50);
            }
        }

        function showSuccess(message) {
            const toast = document.getElementById('successToast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 1000);
        }

        document.addEventListener('DOMContentLoaded', function() {
            console.log('🎾 Pickleball Score Remote loaded');

            const deepLinkSession = detectDeepLink();

            if (deepLinkSession) {
                console.log('🔗 Deep Link detected on load:', deepLinkSession);
                handleDeepLink(deepLinkSession);
            } else {
                console.log('📱 No Deep Link detected, showing manual input');
                resetConnectionScreen();
            }

            const sessionInput = document.getElementById('sessionIdInput');
            sessionInput.addEventListener('input', (e) => {
                e.target.value = e.target.value.toUpperCase();
            });

            sessionInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    connectToSession();
                }
            });
        });

        document.addEventListener('capacitor:appUrlOpen', (event) => {
            console.log('📱 Capacitor Deep Link received:', event.detail.url);

            const url = event.detail.url;
            const sessionMatch = url.match(/pickleballtv:\/\/join\/([A-Z0-9]{6})/i);

            if (sessionMatch) {
                const sessionId = sessionMatch[1].toUpperCase();
                console.log('✅ Capacitor Deep Link session:', sessionId);
                handleDeepLink(sessionId);
            }
        });

        window.addEventListener('focus', () => {
            console.log('🔍 Window focused, checking for new Deep Link data...');

            const newSession = detectDeepLink();
            if (newSession && newSession !== currentSessionId) {
                console.log('🔗 New Deep Link detected:', newSession);
                handleDeepLink(newSession);
            }
        });

        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                console.log('👁️ Page visible, checking Deep Link...');

                const newSession = detectDeepLink();
                if (newSession && newSession !== currentSessionId) {
                    console.log('🔗 Deep Link detected on visibility:', newSession);
                    handleDeepLink(newSession);
                }
            }
        });

        console.log('🚀 Deep Link Score Control System ready!');
    </script>
</body>
</html>
